<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexdo Adventours - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.css">
</head>
<body>
  <script>netlifyIdentitySiteURL = 'https://nexdoadventours.netlify.app'</script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/'
          })
        }
      })
    }
  </script>
</body>
</html>
