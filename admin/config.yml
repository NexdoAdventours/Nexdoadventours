backend:
  name: git-gateway
  branch: master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Info"
        file: "admin/content/settings.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string", default: "+256 782 725 895" }
          - { label: "Email", name: "email", widget: "string", default: "nexdoadventours@gmail.com" }
          - { label: "Address", name: "address", widget: "string", default: "Numak Tower, Kyaggwe Rd, Kampala" }
          - { label: "WhatsApp Link", name: "whatsapp", widget: "string", default: "https://wa.me/256782725895" }
          - { label: "Community Link", name: "community", widget: "string", default: "https://chat.whatsapp.com/IbzYHj05mfh3iBCMGWgY1C" }

  - name: "homepage"
    label: "Homepage"
    editor:
      preview: false
    files:
      - name: "hero"
        label: "Hero Section"
        file: "admin/content/hero.md"
        fields:
          - { label: "Heading", name: "heading", widget: "string", default: "Welcome to Nexdo Adventours Ltd" }
          - { label: "Description", name: "description", widget: "text", default: "Discover the Pearl of Africa with Us..." }
          - { label: "Stats - Happy Travelers", name: "travelers", widget: "string", default: "250+" }
          - { label: "Stats - Destinations", name: "destinations", widget: "string", default: "12+" }

      - name: "about"
        label: "About Section"
        file: "admin/content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "About Nexdo Adventours" }
          - { label: "Content", name: "content", widget: "markdown" }

      - name: "services"
        label: "Services Section"
        file: "admin/content/services.md"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Our Services" }
          - { label: "Subtitle", name: "subtitle", widget: "string", default: "Tailored experiences for every kind of traveler" }
          - name: "services"
            label: "Services"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string", hint: "Font Awesome class e.g. fas fa-safari" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "packages"
    label: "Tour Packages"
    label_singular: "Package"
    folder: "admin/content/packages"
    create: true
    format: "yml"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Duration", name: "duration", widget: "string" }
      - { label: "Group Size", name: "groupSize", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Per (e.g. per person)", name: "per", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - label: "Inclusions"
        name: "inclusions"
        widget: "list"
        field: { label: "Item", name: "item", widget: "string" }
      - label: "Book Now Link"
        name: "bookLink"
        widget: "string"
        default: "https://wa.me/256782725895?text=Hello%2C%20Nexdo%20Adventours."

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "admin/content/blog"
    create: true
    format: "md"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tag", name: "tag", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    label_singular: "Image"
    folder: "admin/content/gallery"
    create: true
    format: "yml"
    slug: "{{slug}}"
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Alt Text", name: "alt", widget: "string", default: "Uganda adventure" }

  - name: "faq"
    label: "FAQs"
    label_singular: "FAQ"
    folder: "admin/content/faq"
    create: true
    format: "yml"
    slug: "{{slug}}"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer", name: "answer", widget: "text" }
